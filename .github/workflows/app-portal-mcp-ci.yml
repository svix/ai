name: App Portal MCP CI

on:
  pull_request:
    paths:
      - 'app-portal-mcp/**'
      - '.github/workflows/app-portal-mcp-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'app-portal-mcp/**'
      - '.github/workflows/app-portal-mcp-ci.yml'

# When pushing to a PR, cancel any jobs still running for the previous head commit.
concurrency:
  group: app-portal-mcp-ci-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  ci_toolchain_rust: "1.96"

defaults:
  run:
    working-directory: app-portal-mcp

jobs:
  check-fmt:
    name: Formatting
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0
      # Nightly is required for the unstable options in .rustfmt.toml.
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - name: rustfmt
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: ${{ env.ci_toolchain_rust }}
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "app-portal-mcp -> target"
          prefix-key: "app-portal-mcp-${{ env.ci_toolchain_rust }}"
      - name: Clippy
        run: cargo clippy --locked --all-targets -- -D warnings

  cargo-sort:
    name: Cargo.toml sorting
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Install cargo-sort
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-sort
      - name: cargo sort
        run: cargo sort --check
