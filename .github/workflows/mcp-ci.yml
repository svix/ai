name: MCP CI
on:
  pull_request:
    paths:
      - 'mcp/**'
      - '.github/workflows/mcp-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'mcp/**'
      - '.github/workflows/mcp-ci.yml'
  # Build and push the MCP image to GHCR on demand (the `docker` job below).
  workflow_dispatch:
    inputs:
      image:
        description: 'GHCR image to push to. Override to publish to a personal namespace.'
        type: string
        default: 'ghcr.io/svix/svix-mcp'
# When pushing to a PR, cancel any jobs still running for the previous head commit.
concurrency:
  group: mcp-ci-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  ci_toolchain_rust: "1.97.1"
defaults:
  run:
    working-directory: mcp
jobs:
  check-fmt:
    name: Formatting
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0
      # Nightly is required for the unstable options in .rustfmt.toml.
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - name: rustfmt
        run: cargo fmt --all -- --check
  clippy:
    name: Clippy
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: ${{ env.ci_toolchain_rust }}
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "mcp -> target"
          prefix-key: "mcp-${{ env.ci_toolchain_rust }}"
      - name: Clippy
        run: cargo clippy --locked --all-targets -- -D warnings
  test:
    name: Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: ${{ env.ci_toolchain_rust }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "mcp -> target"
          prefix-key: "mcp-${{ env.ci_toolchain_rust }}"
      - name: Test
        run: cargo test --locked
  cargo-sort:
    name: Cargo.toml sorting
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Install cargo-sort
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-sort
      - name: cargo sort
        run: cargo sort --check
  docker:
    name: Docker image
    needs: [check-fmt, clippy, test, cargo-sort]
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    uses: docker/github-builder/.github/workflows/build.yml@v1.14.0
    with:
      output: image
      push: true
      context: mcp
      file: mcp/Dockerfile
      platforms: linux/amd64,linux/arm64
      meta-images: ${{ inputs.image }}
      meta-flavor: |
        latest=${{ github.ref == 'refs/heads/main' }}
      meta-tags: |
        type=sha,format=long
    secrets:
      # only write packages under `svix`; pushing elsewhere needs a PAT in GHCR_TOKEN
      # (scope: write:packages) plus the matching username in the GHCR_USER variable.
      registry-auths: |
        - registry: ghcr.io
          username: ${{ vars.GHCR_USER || github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
