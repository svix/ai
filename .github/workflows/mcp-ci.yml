name: MCP CI
on:
  pull_request:
    paths:
      - 'mcp/**'
      - '.github/workflows/mcp-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'mcp/**'
      - '.github/workflows/mcp-ci.yml'
# When pushing to a PR, cancel any jobs still running for the previous head commit.
concurrency:
  group: mcp-ci-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  ci_toolchain_rust: "1.96"
defaults:
  run:
    working-directory: mcp
jobs:
  check-fmt:
    name: Formatting
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0
      # Nightly is required for the unstable options in .rustfmt.toml.
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - name: rustfmt
        run: cargo fmt --all -- --check
  clippy:
    name: Clippy
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: ${{ env.ci_toolchain_rust }}
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "mcp -> target"
          prefix-key: "mcp-${{ env.ci_toolchain_rust }}"
      - name: Clippy
        run: cargo clippy --locked --all-targets -- -D warnings
  test:
    name: Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: ${{ env.ci_toolchain_rust }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "mcp -> target"
          prefix-key: "mcp-${{ env.ci_toolchain_rust }}"
      - name: Test
        run: cargo test --locked
  cargo-sort:
    name: Cargo.toml sorting
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Install cargo-sort
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-sort
      - name: cargo sort
        run: cargo sort --check
