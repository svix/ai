default_stages: [pre-commit]
repos:
  - repo: builtin
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: check-yaml
      - id: check-json
  - repo: https://github.com/google/yamlfmt
    rev: v0.21.0
    hooks:
      - id: yamlfmt
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint
  - repo: https://github.com/crate-ci/typos
    rev: v1.46.3
    hooks:
      - id: typos
  # Mirrors .github/workflows/app-portal-mcp-ci.yml so the Rust CI fails locally
  # before commit. Scoped to the crate; heavy checks only fire when it changes.
  - repo: local
    hooks:
      - id: app-portal-mcp-fmt
        name: app-portal-mcp rustfmt
        # Nightly required for the unstable options in .rustfmt.toml (matches CI).
        entry: bash -c 'cd app-portal-mcp && cargo +nightly fmt --all -- --check'
        language: system
        files: ^app-portal-mcp/
        pass_filenames: false
      - id: app-portal-mcp-clippy
        name: app-portal-mcp clippy
        entry: bash -c 'cd app-portal-mcp && cargo clippy --locked --all-targets -- -D warnings'
        language: system
        files: ^app-portal-mcp/
        pass_filenames: false
      - id: app-portal-mcp-cargo-sort
        name: app-portal-mcp cargo sort
        entry: bash -c 'cd app-portal-mcp && cargo sort --check'
        language: system
        files: ^app-portal-mcp/
        pass_filenames: false
