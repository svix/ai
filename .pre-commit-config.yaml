default_stages: [pre-commit]
repos:
  - repo: builtin
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: check-yaml
      - id: check-json
  - repo: https://github.com/google/yamlfmt
    rev: v0.21.0
    hooks:
      - id: yamlfmt
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint
  - repo: https://github.com/crate-ci/typos
    rev: v1.46.3
    hooks:
      - id: typos
  # Mirrors .github/workflows/mcp-ci.yml so the Rust CI fails locally
  # before commit. Scoped to the crate; heavy checks only fire when it changes.
  - repo: local
    hooks:
      - id: mcp-fmt
        name: mcp rustfmt
        # Nightly required for the unstable options in .rustfmt.toml (matches CI).
        entry: bash -c 'cd mcp && cargo +nightly fmt --all -- --check'
        language: system
        files: ^mcp/
        pass_filenames: false
      - id: mcp-clippy
        name: mcp clippy
        entry: bash -c 'cd mcp && cargo clippy --locked --all-targets -- -D warnings'
        language: system
        files: ^mcp/
        pass_filenames: false
      - id: mcp-cargo-sort
        name: mcp cargo sort
        entry: bash -c 'cd mcp && cargo sort --check'
        language: system
        files: ^mcp/
        pass_filenames: false
